# file k8s/ollama-gpu-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama-gpu
  namespace: edu-helpai
  labels:
    app: ollama
    profile: gpu
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
        profile: gpu
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 11434
          volumeMounts:
            - name: ollama-models
              mountPath: /root/.ollama
          env:
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
          resources:
            limits:
              nvidia.com/gpu: 1  # request 1 GPU
              cpu: "4"
              memory: "8Gi"
            requests:
              nvidia.com/gpu: 1
              memory: "4Gi"
              cpu: "2"
          readinessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 20
      volumes:
        - name: ollama-models
          persistentVolumeClaim:
            claimName: ollama-models-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: ollama-service
  namespace: edu-helpai
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434