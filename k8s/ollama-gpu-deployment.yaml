# file k8s/ollama-gpu-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama-gpu
  namespace: edu-helpai
  labels:
    app: ollama
    profile: gpu
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama-gpu
  template:
    metadata:
      labels:
        app: ollama-gpu
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
          volumeMounts:
            - name: ollama-models
              mountPath: /root/.ollama
          resources:
            limits:
              nvidia.com/gpu: 1  # request 1 GPU
            requests:
              memory: "4Gi"
              cpu: "2"
      volumes:
        - name: ollama-models
          persistentVolumeClaim:
            claimName: ollama-models-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: ollama-service
  namespace: edu-helpai
spec:
  selector:
    app: ollama-gpu
  ports:
    - port: 11434
      targetPort: 11434