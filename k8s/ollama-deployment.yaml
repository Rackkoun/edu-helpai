# file k8s/ollama-deployment.yaml
apiVersion: v1
kind: Deployment
metadata:
  name: ollama
  namespace: edu-helpai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPorts: 11434
          volumeMounts:
            - name: ollama-models
              mountPath: /root/.ollama
          resources:
            requests:
              memory: "4Gi"
              cpu: "1"
            limits:
              memory: "8Gi" 
              cpu: "4"
      volumeMounts:
        - name: ollama-models
          PersistentVolumeClaim:
            claimName: ollama-models-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: ollama-service
  namespace: edu-helpai
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-models-pvc
  namespace: edu-helpai
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi