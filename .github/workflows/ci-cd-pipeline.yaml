# file .github/workflows/ci-cd-pipeline.yaml
name: Edu-HelpAI CI/CD Pipeline

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  # 1. Code quality
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11.3
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.3"
          cache: "pip"
      
      - name: Install Dev Dependencies
        run: pip install .[dev]
      
      - name: Black (Formatting Check)
        run: black --check src/ tests/
      
      - name: Flake8 (Linting)
        run: flake8 src/ tests/ --max-line-length=88 --extend-ignore=E203
      
      - name: MyPy (Type Check)
        run: mypy src/ --ignore-missing-imports
  
  # 1. Tests
  test:
    name: Tests (>=90% Coverage)
    runs-on: ubuntu-latest
    # only run if link passes
    needs: lint
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.11.3
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.3"
          cache: "pip"
      
      - name: Install Dependencies
        run: pip install .[dev]
      
      - name: Run Tests With Coverage
        env:
          ENVIRONMENT: test
          SECRET_KEY: ${{ secrets.TEST_SECRET_KEY }}
        run: |
          pytest tests/ \
            --cov=src/backend \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=90 \
            -v
      
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
  
  # 3. Build Docker, only on main
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    # only if merged
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Backend Image
        uses: docker/build-push-action@v5
        with:
          context: docker/
          file: Dockerfile.backend
          push: false
          tags: edu-helpai-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: docker/
          file: Dockerfile.frontend
          push: false
          tags: edu-helpai-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max